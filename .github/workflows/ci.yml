name: CI

env:
  WORKAI_PYTHON_VERSION: "3.12"

on:
  push:
    branches: [Itogmain, main, "phase-*"]
  pull_request:
    branches: [Itogmain, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.WORKAI_PYTHON_VERSION }}
          cache: "pip"

      - name: Verify Python version
        run: |
          python - <<'PY'
          import sys
          assert sys.version_info[:2] == (3, 12), f"Expected Python 3.12.x, got {sys.version}"
          print(sys.version)
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install psycopg2-binary

      - name: AI dependency compatibility guard
        run: python scripts/check_ai_dependency_compat.py

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy WorkAI

      - name: Cutover path-policy check
        run: python scripts/run_cutover_readiness.py

      - name: Pytest
        run: pytest -q -m "not integration and not integration_online"

  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      WORKAI_DB__DSN: postgresql://postgres:postgres@localhost:5432/postgres
      WORKAI_ENV: dev
      WORKAI_LOG__LEVEL: INFO
      WORKAI_LOG__JSON: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.WORKAI_PYTHON_VERSION }}
          cache: "pip"

      - name: Verify Python version
        run: |
          python - <<'PY'
          import sys
          assert sys.version_info[:2] == (3, 12), f"Expected Python 3.12.x, got {sys.version}"
          print(sys.version)
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import time
          import psycopg

          dsn = "postgresql://postgres:postgres@localhost:5432/postgres"
          for attempt in range(30):
            try:
              with psycopg.connect(dsn) as conn:
                with conn.cursor() as cur:
                  cur.execute("SELECT 1")
                  cur.fetchone()
              print("postgres is ready")
              break
            except Exception:
              if attempt == 29:
                raise
              time.sleep(1)
          PY

      - name: Alembic upgrade head
        run: |
          for attempt in 1 2 3 4 5; do
            echo "alembic upgrade attempt ${attempt}"
            if alembic upgrade head; then
              exit 0
            fi
            sleep 2
          done
          echo "alembic upgrade failed after retries"
          exit 1

      - name: Alembic safety cycle (upgrade/downgrade/upgrade)
        run: |
          alembic downgrade -1
          alembic upgrade head

      - name: API integration smoke (must not skip)
        run: |
          pytest -q tests/integration/test_api_smoke.py --require-integration-env -rA | tee /tmp/api_smoke.txt
          if grep -Eq "SKIPPED| [0-9]+ skipped" /tmp/api_smoke.txt; then
            echo "API integration smoke was skipped, expected real execution"
            exit 1
          fi

      - name: Audit integration smoke (must not skip)
        run: |
          pytest -q tests/integration/test_audit_smoke.py --require-integration-env -rA | tee /tmp/audit_smoke.txt
          if grep -Eq "SKIPPED| [0-9]+ skipped" /tmp/audit_smoke.txt; then
            echo "Audit integration smoke was skipped, expected real execution"
            exit 1
          fi

      - name: Notifier integration smoke (must not skip)
        run: |
          pytest -q tests/integration/test_notifier_smoke.py --require-integration-env -rA | tee /tmp/notifier_smoke.txt
          if grep -Eq "SKIPPED| [0-9]+ skipped" /tmp/notifier_smoke.txt; then
            echo "Notifier integration smoke was skipped, expected real execution"
            exit 1
          fi

      - name: Ops integration smoke (must not skip)
        run: |
          pytest -q tests/integration/test_ops_smoke.py --require-integration-env -rA | tee /tmp/ops_smoke.txt
          if grep -Eq "SKIPPED| [0-9]+ skipped" /tmp/ops_smoke.txt; then
            echo "Ops integration smoke was skipped, expected real execution"
            exit 1
          fi

      - name: Integration tests (PostgreSQL)
        run: pytest -q -m integration --require-integration-env

  integration-online:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      WORKAI_DB__DSN: postgresql://postgres:postgres@localhost:5432/postgres
      WORKAI_ENV: dev
      WORKAI_LOG__LEVEL: INFO
      WORKAI_LOG__JSON: false
      WORKAI_GSHEETS__ENABLED: true
      WORKAI_GSHEETS__SPREADSHEET_ID: ${{ secrets.WORKAI_GSHEETS_TEST_SPREADSHEET_ID }}
      WORKAI_GSHEETS__RANGES: Sheet1!A1:Z200
      WORKAI_GSHEETS__SERVICE_ACCOUNT_JSON_B64: ${{ secrets.WORKAI_GSHEETS_TEST_SERVICE_ACCOUNT_JSON_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.WORKAI_PYTHON_VERSION }}
          cache: "pip"

      - name: Verify Python version
        run: |
          python - <<'PY'
          import sys
          assert sys.version_info[:2] == (3, 12), f"Expected Python 3.12.x, got {sys.version}"
          print(sys.version)
          PY

      - name: Validate required Google integration secrets
        run: |
          if [ -z "${WORKAI_GSHEETS__SPREADSHEET_ID:-}" ]; then
            echo "Missing required GitHub secret: WORKAI_GSHEETS_TEST_SPREADSHEET_ID"
            exit 1
          fi
          if [ -z "${WORKAI_GSHEETS__SERVICE_ACCOUNT_JSON_B64:-}" ]; then
            echo "Missing required GitHub secret: WORKAI_GSHEETS_TEST_SERVICE_ACCOUNT_JSON_B64"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import time
          import psycopg

          dsn = "postgresql://postgres:postgres@localhost:5432/postgres"
          for attempt in range(30):
            try:
              with psycopg.connect(dsn) as conn:
                with conn.cursor() as cur:
                  cur.execute("SELECT 1")
                  cur.fetchone()
              print("postgres is ready")
              break
            except Exception:
              if attempt == 29:
                raise
              time.sleep(1)
          PY

      - name: Alembic upgrade head
        run: alembic upgrade head

      - name: Integration online tests (Google)
        run: |
          pytest -q -m integration_online --require-integration-env --require-integration-online-env -rA | tee /tmp/integration_online.txt
          if grep -Eq "SKIPPED| [0-9]+ skipped" /tmp/integration_online.txt; then
            echo "integration_online tests were skipped, expected real execution"
            exit 1
          fi
